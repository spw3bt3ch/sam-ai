{% extends "base.html" %}

{% block title %}Register - AI Training Platform{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center pt-28 pb-20 px-6 md:px-12 relative overflow-hidden"
    style="background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.1) 0%, #080d1c 70%);">
    
    <!-- Background elements -->
    <div class="absolute inset-0 pointer-events-none"
        style="background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 40px 40px;"></div>
    <div class="absolute w-96 h-96 bg-primary-500/10 rounded-full blur-3xl -top-20 -left-20"></div>
    <div class="absolute w-96 h-96 bg-accent-500/10 rounded-full blur-3xl bottom-0 right-0"></div>

    <div class="max-w-xl w-full z-10">
        <div class="glass-card rounded-3xl p-8 md:p-10 border border-white/10 shadow-2xl relative overflow-hidden">
            <!-- Glow edge -->
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-cyan-400 via-primary-500 to-accent-500"></div>
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-white mb-2">Join the <span class="gradient-text">AI Program</span></h1>
                <p class="text-slate-400 text-sm">Register to access your dashboard and start learning.</p>
            </div>

            <form action="/register" method="POST" class="space-y-5">
                
                <!-- Full Name -->
                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2">Full Name *</label>
                    <input type="text" name="full_name" required
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all"
                        placeholder="John Doe">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2">Email Address *</label>
                    <input type="email" name="email" required
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all"
                        placeholder="john@example.com">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2">Create Password *</label>
                    <input type="password" name="password" required minlength="6"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all"
                        placeholder="Min. 6 characters">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- Mobile Number -->
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2">Mobile Number *</label>
                        <input type="tel" name="mobile_number" required
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all"
                            placeholder="+234...">
                    </div>
                    <!-- WhatsApp Number -->
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2">WhatsApp Number</label>
                        <input type="tel" name="whatsapp_number"
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all"
                            placeholder="If different">
                        <p class="text-xs text-slate-500 mt-1">Leave empty to use Mobile Number</p>
                    </div>
                </div>

                <!-- Location -->
                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2">Location *</label>
                    <input type="text" name="location" required
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all"
                        placeholder="E.g. Ikeja, Lagos">
                </div>

                <!-- Referral Source -->
                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2">How did you hear about us? *</label>
                    <select name="referral_source" required
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all appearance-none">
                        <option value="" disabled selected>Select an option</option>
                        <option value="Facebook/Instagram Ads">Facebook/Instagram Ads</option>
                        <option value="WhatsApp Group">WhatsApp Group</option>
                        <option value="Friend/Referral">Friend/Referral</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Learning Goal -->
                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2">What would you like to achieve? *</label>
                    <textarea name="learning_goal" required rows="3"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all"
                        placeholder="Your main goal after this training..."></textarea>
                </div>

                <button type="submit"
                    class="w-full py-4 mt-6 rounded-xl text-white font-bold text-lg shadow-lg shadow-primary-500/25 hover:shadow-primary-500/40 hover:scale-[1.02] transition-all"
                    style="background: linear-gradient(135deg, #06b6d4, #3b82f6, #8b5cf6);">
                    Complete Registration
                </button>
            </form>
            
            <div class="mt-6 text-center text-slate-400 text-sm">
                Already registered? <a href="/login" class="text-primary-400 hover:text-primary-300 font-semibold">Login here</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
